<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Личный архив Bing Wallpaper UHD">
    <meta name="theme-color" content="#121212">
    <title>Горизонт | Bing Archive</title>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        h1 { text-align: center; margin: 60px 0; font-weight: 200; letter-spacing: .5em; text-transform: uppercase; font-size: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { position: relative; overflow: hidden; border-radius: 8px; background: #1e1e1e; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; opacity: 0; transition: .3s; }
        .card img.loaded { opacity: 1; }
        .overlay { position: absolute; inset: 0; z-index: 10; }
        .info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 15px 15px; background: linear-gradient(transparent, rgba(0,0,0,.9)); opacity: 0; transition: .3s; pointer-events: none; }
        .card:hover .info { opacity: 1; }
        .title { font-size: 13px; text-transform: uppercase; }
        .date { font-size: 10px; color: #aaa; margin-top: 5px; }

        .lightbox { position: fixed; inset: 0; display: none; background: rgba(0,0,0,.95); justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 80%; user-select: none; -webkit-user-drag: none; -webkit-touch-callout: none; pointer-events: auto; }
        .close { position: absolute; right: 35px; top: 25px; font-size: 40px; background: none; border: 0; color: white; cursor: pointer; }
        .controls { margin-top: 20px; }
        button { background: #222; color: white; border: 0; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #0078d4; }

        .menu { position: fixed; display: none; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 5px; z-index: 2000; }
        .menu.active { display: block; }
        .menu div { padding: 10px 20px; cursor: pointer; }
        .menu div:hover { background: #0078d4; }
    </style>
</head>
<body>

    <h1>Горизонт</h1>
    <div class="grid" id="gallery"></div>

    <div class="lightbox" id="viewer">
        <button class="close" id="close">×</button>
        <img id="bigImage">
        <div class="controls">
            <button id="download">Скачать UHD</button>
        </div>
    </div>

    <div class="menu" id="menu">
        <div id="menuDownload">Скачать UHD</div>
    </div>

    <script>
        const gallery = document.getElementById("gallery");
        const viewer = document.getElementById("viewer");
        const bigImage = document.getElementById("bigImage");
        const menu = document.getElementById("menu");
        let current = null;

        async function download(item) {
            try {
                const r = await fetch(item.url);
                const blob = await r.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${item.id}_${item.date}.jpg`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 2000);
            } catch { alert("Ошибка загрузки"); }
        }

        function openViewer(item) {
            current = item;
            bigImage.src = item.url;
            viewer.classList.add("active");
        }

        function closeViewer() {
            viewer.classList.remove("active");
            bigImage.src = "";
        }

        fetch("data.json?" + Date.now())
            .then(r => r.json())
            .then(data => {
                Object.values(data).sort((a,b) => b.date.localeCompare(a.date)).forEach(item => {
                    const card = document.createElement("div"); card.className = "card";
                    const img = document.createElement("img"); img.src = item.preview; img.loading = "lazy";
                    img.onload = () => img.classList.add("loaded");
                    
                    const overlay = document.createElement("div"); overlay.className = "overlay";
                    const info = document.createElement("div"); info.className = "info";
                    info.innerHTML = `<div class="title">${item.title || ""}</div><div class="date">${item.date || ""} ${(item.markets||[]).join(" • ")}</div>`;
                    
                    card.append(img, overlay, info);
                    overlay.onclick = () => openViewer(item);
                    overlay.oncontextmenu = e => {
                        e.preventDefault();
                        current = item;
                        menu.style.left = e.clientX + "px";
                        menu.style.top = e.clientY + "px";
                        menu.classList.add("active");
                    };
                    gallery.append(card);
                });
            });

        bigImage.oncontextmenu = e => {
            e.preventDefault();
            menu.style.left = e.clientX + "px";
            menu.style.top = e.clientY + "px";
            menu.classList.add("active");
        };

        document.getElementById("download").onclick = () => download(current);
        document.getElementById("menuDownload").onclick = () => { download(current); menu.classList.remove("active"); };
        document.onclick = e => { if(!e.target.closest(".menu")) menu.classList.remove("active"); };
        document.onkeydown = e => { if(e.key === "Escape") closeViewer(); };
        document.getElementById("close").onclick = closeViewer;
        viewer.onclick = e => { if(e.target === viewer) closeViewer(); };
        window.onresize = window.onscroll = () => menu.classList.remove("active");
    </script>
</body>
</html>
