<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Горизонт | Bing Archive</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: #050505; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { position: relative; overflow: hidden; border-radius: 8px; background: #1e1e1e; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; display: block; }
        
        /* Слой для клика по картинке */
        .overlay { position: absolute; inset: 0; z-index: 10; }
        
        /* Слой с текстом */
        .info { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            padding: 40px 15px 15px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            opacity: 0; transition: 0.3s; z-index: 11;
        }
        .card:hover .info { opacity: 1; }
        
        .title, .date, .desc-text { user-select: text !important; cursor: text; pointer-events: auto; }
        .title { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .desc-text { font-size: 11px; color: #bbb; margin-top: 6px; }
        .date { font-size: 10px; color: #aaa; margin-top: 5px; }
        
        /* Остальные стили lightbox без изменений... */
        .lightbox { position: fixed; inset: 0; display: none; background: rgba(0,0,0,.95); z-index: 1000; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
    </style>
</head>
<body>
    <div class="grid" id="gallery"></div>
    <div class="lightbox" id="viewer"><img id="bigImage"><button id="close">×</button></div>

    <script>
        // ... (логика загрузки и download такая же) ...
        // В цикле создания карточки:
        
        const overlay = document.createElement("div"); overlay.className = "overlay";
        const info = document.createElement("div"); info.className = "info";
        
        // ... (добавляем title, desc, date в info) ...

</body>
</html>
